name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

jobs:
  build:
    runs-on: windows-latest

    # 添加权限设置
    permissions:
      contents: write  # 允许创建和更新Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，用于生成发布说明

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: go mod download

    - name: Run tests
      run: go test ./...

    - name: Build for Windows
      run: |
        $env:CGO_ENABLED = "0"
        go build -ldflags="-s -w" -o adb-broadcast-sender.exe ./cmd/adb-broadcast-sender

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          adb-broadcast-sender.exe
          README.md
          LICENSE
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}